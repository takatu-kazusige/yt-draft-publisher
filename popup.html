<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ff0000;
    }
    h1 svg { flex-shrink: 0; }

    .section {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    label {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #ff0000; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ff0000;
      color: #fff;
    }
    .btn-primary:hover { background: #cc0000; }
    .btn-primary:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }
    #status.running { background: #1a3a1a; color: #4caf50; display: block; }
    #status.error   { background: #3a1a1a; color: #f44336; display: block; }
    #status.done    { background: #1a2a3a; color: #64b5f6; display: block; }

    .warning {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      line-height: 1.5;
    }
    .warning span { color: #ffb300; }
  </style>
</head>
<body>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#ff0000">
      <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
    </svg>
    YouTube ドラフト一括公開
  </h1>

  <div class="section">
    <label>公開設定</label>
    <select id="visibility">
      <option value="unlisted">限定公開</option>
      <option value="public">公開</option>
      <option value="private">非公開</option>
    </select>
  </div>

  <div class="section">
    <label>子ども向けコンテンツ</label>
    <select id="madeForKids">
      <option value="not">子ども向けではない</option>
      <option value="yes">子ども向け</option>
    </select>
  </div>

  <button class="btn btn-primary" id="runBtn">▶ このページのドラフトを一括処理</button>

  <div id="status"></div>

  <p class="warning">
    ⚠ <span>YouTube Studio のコンテンツページ</span>で使用してください。<br>
    1ページ分（最大50件）を処理します。複数ページある場合はページを移動して再実行してください。
  </p>

  <script src="popup.js"></script>
</body>
</html>
